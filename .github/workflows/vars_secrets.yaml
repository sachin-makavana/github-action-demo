name: Variables and secrets Demo

on:
  workflow_dispatch:
    inputs:
      environment_name:
        description: "Environment to deploy"
        required: true
        default: "production"

      application_name:
        description: "Application Name"
        required: true
        default: "my-app"

# ----------------------------------
# Workflow Level Variable
# Available everywhere
# ----------------------------------
env:
  COMPANY_NAME: HM

jobs:

  demo-job:

    runs-on: ubuntu-latest

    # ----------------------------------
    # Environment Variable Scope
    # Pulls vars from GitHub Environment
    # ----------------------------------
    environment: production

    # ----------------------------------
    # Job Level Variable
    # Available only inside this job
    # ----------------------------------
    env:
      JOB_NAME: DeploymentJob

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      # ----------------------------------
      # Manual Inputs
      # ----------------------------------
      - name: Show Workflow Inputs
        run: |
          echo "Application: ${{ inputs.application_name }}"
          echo "Environment: ${{ inputs.environment_name }}"

      # ----------------------------------
      # Environment Level env
      # ----------------------------------
      - name: Workflow Level Variable
        run: |
          echo "Environment Variable = $API_ENV"

      # ----------------------------------
      # Workflow Level env
      # ----------------------------------
      - name: Workflow Level Variable
        run: |
          echo "Company Name = $COMPANY_NAME"

      # ----------------------------------
      # Job Level env
      # ----------------------------------
      - name: Job Level Variable
        run: |
          echo "Job Name = $JOB_NAME"

      # ----------------------------------
      # Step Level env
      # ----------------------------------
      - name: Step Level Variable
        env:
          STEP_NAME: BuildStep
        run: |
          echo "Step Name = $STEP_NAME"

      # ----------------------------------
      # Configuration Variables (vars)
      # Repository / Org / Environment
      # ----------------------------------
      - name: Configuration Variables
        run: |
          echo "App Owner = ${{ vars.APP_OWNER }}"
          echo "API KEY = ${{ secrets.API_KEY }}"

      # ----------------------------------
      # Context Variables
      # ----------------------------------
      - name: GitHub Context Variables
        run: |
          echo "Repository = ${{ github.repository }}"
          echo "Workflow = ${{ github.workflow }}"
          echo "Actor = ${{ github.actor }}"
          echo "Event Name = ${{ github.event_name }}"
          echo "Ref = ${{ github.ref }}"

      - name: Runner Context Variables
        run: |
          echo "Runner OS = ${{ runner.os }}"
          echo "Runner Arch = ${{ runner.arch }}"
          echo "Runner Temp = ${{ runner.temp }}"

      - name: Job Context Variables
        run: |
          echo "Job Status = ${{ job.status }}"
